<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Computer monitor frame -->
  <rect x="12" y="14" width="40" height="28" rx="3" fill="white" fill-opacity="0.95"/>
  <!-- Screen content: lab flask -->
  <g transform="translate(20 18)">
    <!-- Flask body (triangle) -->
    <path d="M 8 2 L 8 9 L 2 22 L 22 22 L 16 9 L 16 2 Z" fill="none" stroke="#0d9488" stroke-width="1.6" stroke-linejoin="round"/>
    <!-- Flask liquid -->
    <path d="M 5 16 L 19 16 L 22 22 L 2 22 Z" fill="#10b981" fill-opacity="0.45"/>
    <!-- Bubbles -->
    <circle cx="8" cy="18" r="1" fill="#0d9488"/>
    <circle cx="13" cy="19" r="0.8" fill="#0d9488"/>
    <circle cx="10" cy="20.5" r="0.7" fill="#0d9488"/>
    <!-- Flask neck top -->
    <line x1="6" y1="2" x2="18" y2="2" stroke="#0d9488" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <!-- Monitor stand -->
  <rect x="28" y="42" width="8" height="5" fill="white" fill-opacity="0.95"/>
  <rect x="22" y="47" width="20" height="3" rx="1.5" fill="white" fill-opacity="0.95"/>
  <!-- Circuit dots in corners (subtle) -->
  <circle cx="14" cy="16" r="1" fill="#0d9488" fill-opacity="0.7"/>
  <circle cx="50" cy="16" r="1" fill="#0d9488" fill-opacity="0.7"/>
  <circle cx="14" cy="40" r="1" fill="#0d9488" fill-opacity="0.7"/>
  <circle cx="50" cy="40" r="1" fill="#0d9488" fill-opacity="0.7"/>
</svg>
